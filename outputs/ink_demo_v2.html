      target.globalAlpha = 1;
      target.fillStyle = "#111";
      target.textAlign = "center";
      target.textBaseline = "middle";
      target.font = `900 ${clamp(W * .16, 108, 190)}px STKaiti, KaiTi, serif`;
      target.fillText("墨", W / 2, H * .33);
      target.font = `${clamp(W * .026, 26, 42)}px STKaiti, KaiTi, serif`;
      const labels = ["スタート", "アルバム", "設定"];
      for (let i = 0; i < labels.length; i++) {
        target.fillText(labels[i], W / 2, H * .57 + i * clamp(H * .065, 42, 58));
      }
      target.restore();
    }

    function drawWorld() {
      const a = worldToScreen(0, 0);
      const b = worldToScreen(WORLD_W, WORLD_H);
      ctx.save();
      ctx.strokeStyle = "rgba(0,0,0,.08)";
      ctx.lineWidth = 1;
      const step = 120 * camera.scale;
      const startX = a.x % step;
      const startY = a.y % step;
      for (let x = startX; x < W; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = startY; y < H; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
      ctx.strokeStyle = "rgba(0,0,0,.42)";
      ctx.lineWidth = Math.max(2, 4 * camera.scale);
      ctx.strokeRect(a.x, a.y, b.x - a.x, b.y - a.y);
      ctx.restore();
    }

    function finish() {
      if (state !== "play") return;
      const elapsed = Math.floor((performance.now() - roundStart) / 1000);
      if (score <= 0) {
        state = "dead";
        document.getElementById("hud").style.display = "none";
        document.getElementById("dead").style.display = "grid";
        document.getElementById("deadStats").textContent = `失敗 · 吸収記録なし · ${Math.floor(elapsed / 60)}:${String(elapsed % 60).padStart(2, "0")}`;
        return;
      }
      state = "ending";
      endingTraceMode = false;
      document.getElementById("hud").style.display = "none";
      document.getElementById("ending").style.display = "grid";
      document.getElementById("convertBtn").textContent = "筆跡";
      document.getElementById("endingStats").textContent = `完成 ${Math.floor(elapsed / 60)}:${String(elapsed % 60).padStart(2, "0")} · 吸収 ${score} · 作画 ${Math.floor(revealCoverage * 100)}%`;
      drawEndingArt();
    }

    function drawEndingArt() {
      if (endingTraceMode) {
        drawEndingTraceArt();
      } else {
        drawEndingOriginalArt();
      }
    }

    function setupEndingCanvas() {
      const rect = endingArt.parentElement.getBoundingClientRect();
      endingArt.width = Math.floor(rect.width * dpr);
      endingArt.height = Math.floor(rect.height * dpr);
      endingCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { w: rect.width, h: rect.height };
    }

    function drawImageCover(target, source, w, h) {
      const iw = source.naturalWidth || source.width;
      const ih = source.naturalHeight || source.height;
      if (!iw || !ih) return false;
      const scale = Math.max(w / iw, h / ih);
      const sw = w / scale;
      const sh = h / scale;
      const sx = (iw - sw) * .5;
      const sy = (ih - sh) * .5;
      target.imageSmoothingEnabled = true;
      target.imageSmoothingQuality = "high";
      target.drawImage(source, sx, sy, sw, sh, 0, 0, w, h);
      return true;
    }

    function drawEndingOriginalArt() {
      const { w, h } = setupEndingCanvas();
      endingCtx.fillStyle = "#f5f0e6";
      endingCtx.fillRect(0, 0, w, h);
      endingCtx.save();
      endingCtx.globalCompositeOperation = "multiply";
      const source = referencePaintingImg.complete && referencePaintingImg.naturalWidth > 0 ? referencePaintingImg : paintingCanvas;
      if (!drawImageCover(endingCtx, source, w, h)) {
        endingCtx.drawImage(paintingCanvas, 0, 0, w, h);
      }
      endingCtx.restore();
    }

    function drawEndingTraceArt() {
      const { w, h } = setupEndingCanvas();
      endingCtx.fillStyle = "#f5f0e6";
      endingCtx.fillRect(0, 0, w, h);
      endingCtx.lineCap = "round";
      endingCtx.lineJoin = "round";
      const sx = w / WORLD_W;
      const sy = h / WORLD_H;
      const rs = Math.min(sx, sy);
      const map = (x, y) => ({ x: x * sx, y: y * sy });
      endingCtx.save();
      endingCtx.globalCompositeOperation = "multiply";
      endingCtx.globalAlpha = .22;
      endingCtx.filter = "blur(2px)";
      endingCtx.drawImage(paintingCanvas, 0, 0, w, h);
      endingCtx.filter = "none";
      endingCtx.restore();
      const tmp = document.createElement("canvas");
      tmp.width = endingArt.width;
      tmp.height = endingArt.height;
      const tctx = tmp.getContext("2d");
      tctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      tctx.globalAlpha = .96;
      tctx.drawImage(paintingCanvas, 0, 0, w, h);
      tctx.globalCompositeOperation = "destination-in";
      tctx.drawImage(revealCanvas, 0, 0, w, h);
      endingCtx.save();
      endingCtx.globalCompositeOperation = "multiply";
      endingCtx.drawImage(tmp, 0, 0, w, h);
      endingCtx.restore();
      endingCtx.save();
      endingCtx.globalCompositeOperation = "multiply";
      for (const leaf of leaves) {
        const p = map(leaf.x, leaf.y);
        const r = leaf.r * rs;
        endingCtx.save();
        endingCtx.translate(p.x, p.y);
        endingCtx.rotate(leaf.rot);
        endingCtx.beginPath();
        endingCtx.arc(0, 0, r, 0, Math.PI * 2);
        endingCtx.clip();
        if (lotusLeafImg.complete && lotusLeafImg.naturalWidth > 0) {
          endingCtx.drawImage(lotusLeafImg, -r, -r, r * 2, r * 2);
        }
        endingCtx.restore();
      }
      for (const flower of flowers) {
        if (flower.eaten) continue;
        const p = map(flower.x, flower.y);
        drawLotusArt(endingCtx, p.x, p.y, flower.r * rs, Math.sin(flower.phase) * .05, 1);
      }
      drawArtElements(endingCtx, map, rs);
      endingCtx.restore();
    }

    function showToast(text) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.style.display = "block";
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.style.display = "none", 1500);
    }

    function applyControlMode() {
      document.body.classList.toggle("control-mobile", controlMode === "mobile");
      document.getElementById("pcModeBtn").classList.toggle("active", controlMode === "pc");
      document.getElementById("mobileModeBtn").classList.toggle("active", controlMode === "mobile");
      if (controlMode !== "mobile") resetJoystick();
      updateCamera(true);
    }

    function setControlMode(mode) {
      controlMode = mode;
      applyControlMode();
    }

    function pauseGame() {
      if (state !== "play") return;
      state = "pause";
      document.getElementById("pauseScreen").style.display = "grid";
      applyControlMode();
    }

    function resumeGame() {
      if (state !== "pause") return;
      state = "play";
      document.getElementById("pauseScreen").style.display = "none";
      lastTime = performance.now();
    }

    function goHome() {
      resetJoystick();
      state = "title";
      document.getElementById("hud").style.display = "none";
      document.getElementById("interlude").style.display = "none";
      document.getElementById("dead").style.display = "none";
      document.getElementById("ending").style.display = "none";
      document.getElementById("pauseScreen").style.display = "none";
      document.getElementById("title").style.display = "grid";
    }

    function resetJoystick() {
      joystick.active = false;
      joystick.id = null;
      joystick.dx = 0;
      joystick.dy = 0;
      const el = document.querySelector(".joystick-ghost");
      if (el) {
        el.style.setProperty("--stick-x", "0px");
        el.style.setProperty("--stick-y", "0px");
      }
    }

    function updateJoystickFromPointer(e) {
      const el = document.querySelector(".joystick-ghost");
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const max = rect.width * .32;
      const rawX = e.clientX - cx;
      const rawY = e.clientY - cy;
      const len = Math.hypot(rawX, rawY);
      const scale = len > max ? max / len : 1;
      const sx = rawX * scale;
      const sy = rawY * scale;
      joystick.dx = sx / max;
      joystick.dy = sy / max;
      el.style.setProperty("--stick-x", `${sx}px`);
      el.style.setProperty("--stick-y", `${sy}px`);
    }

    function loop(now) {
      const dt = Math.min(.05, (now - lastTime) / 1000);
      lastTime = now;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    addEventListener("resize", resize);
    addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    addEventListener("touchstart", e => { if (controlMode === "pc" && e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; } }, { passive: false });
    addEventListener("touchmove", e => {
      e.preventDefault();
      if (controlMode === "pc" && e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }
    }, { passive: false });
    addEventListener("keydown", e => {
      keys.add(e.key);
      keys.add(e.key.toLowerCase());
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "w", "a", "s", "d", "W", "A", "S", "D"].includes(e.key)) e.preventDefault();
      if (e.key === "Shift") { e.preventDefault(); triggerSpurt(); }
      if (e.key === "Escape") { e.preventDefault(); state === "pause" ? resumeGame() : pauseGame(); }
    });
    addEventListener("keyup", e => { keys.delete(e.key); keys.delete(e.key.toLowerCase()); });

    const joystickEl = document.querySelector(".joystick-ghost");
    joystickEl.addEventListener("pointerdown", e => {
      if (controlMode !== "mobile") return;
      e.preventDefault();
      joystick.active = true;
      joystick.id = e.pointerId;
      joystickEl.setPointerCapture(e.pointerId);
      updateJoystickFromPointer(e);
    });
    joystickEl.addEventListener("pointermove", e => {
      if (!joystick.active || joystick.id !== e.pointerId) return;
      e.preventDefault();
      updateJoystickFromPointer(e);
    });
    joystickEl.addEventListener("pointerup", e => {
      if (joystick.id === e.pointerId) resetJoystick();
    });
    joystickEl.addEventListener("pointercancel", e => {
      if (joystick.id === e.pointerId) resetJoystick();
    });

    document.getElementById("startBtn").onclick = startGame;
    document.getElementById("restartBtn").onclick = startGame;
    document.getElementById("nextBtn").onclick = startGame;
    document.getElementById("spurtBtn").onclick = triggerSpurt;
    document.getElementById("pauseBtn").onclick = pauseGame;
    document.getElementById("resumeBtn").onclick = resumeGame;
    document.getElementById("pauseHomeBtn").onclick = goHome;
    document.getElementById("pcModeBtn").onclick = () => setControlMode("pc");
    document.getElementById("mobileModeBtn").onclick = () => setControlMode("mobile");
    document.getElementById("deadHomeBtn").onclick = goHome;
    document.getElementById("homeBtn").onclick = goHome;
    document.getElementById("detailBtn").onclick = () => showToast("作品詳細は今後追加予定です");
    document.getElementById("albumBtn").onclick = () => showToast("アルバム：次の版で保存機能を追加予定");
    document.getElementById("configBtn").onclick = () => showToast("設定：次の版で調整項目を追加予定");
    document.getElementById("saveBtn").onclick = () => {
      const a = document.createElement("a");
      a.download = `ink_painting_${Date.now()}.png`;
      a.href = endingArt.toDataURL("image/png");
      a.click();
    };
    document.getElementById("convertBtn").onclick = () => {
      endingTraceMode = !endingTraceMode;
      document.getElementById("convertBtn").textContent = endingTraceMode ? "戻る" : "筆跡";
      drawEndingArt();
    };

    resize();
    resetWorld();
    applyControlMode();
    render();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
